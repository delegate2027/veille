    .item {
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      transition: 0.15s ease;
      overflow: hidden;
      background: var(--card);
    }

    .item:hover {
      transform: translateY(-1px);
      border-color: #cbd5e1;
    }

    .top {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    .author {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 999px;
      color: white;
      letter-spacing: 0.3px;
      background: #6b7280;
    }

    .date {
      color: var(--muted);
      font-size: 10px;
    }

    .title {
      font-size: 12px;
      line-height: 1.3;
      font-weight: 600;
      margin-bottom: 3px;
    }

    .title a {
      color: #111827;
      text-decoration: none;
    }

    .title a:hover {
      opacity: 0.85;
    }

    .desc {
      color: #4b5563;
      font-size: 11px;
      line-height: 1.35;

      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;

  <div class="header-line">
    <h1>&nbsp Veille 2027</h1>

    <div class="last-update" id="lastUpdate">
      &nbsp Dernière actualisation : chargement...
    </div>
  </div>

  <div class="feed" id="feed"></div>

  <script>
    async function loadRSS() {

      const response = await fetch("aggregate.xml");

      // Date de dernière modification du fichier XML
      const lastModified = response.headers.get("Last-Modified");

      if (lastModified) {
        const updateDate = new Date(lastModified);

        document.getElementById("lastUpdate").innerHTML =
          "&nbsp Dernière actualisation : " +
          updateDate.toLocaleDateString("fr-FR", {
            day: "2-digit",
            month: "2-digit",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit"
          });
      }
      const xmlText = await response.text();

      const parser = new DOMParser();
      const xml = parser.parseFromString(xmlText, "text/xml");

      let items = [...xml.querySelectorAll("item")]

      // Trier par date décroissante
      .sort((a, b) => {

        return new Date(
          b.querySelector("pubDate").textContent
        ) - new Date(
          a.querySelector("pubDate").textContent
        );
      })

      // Garder uniquement les 50 dernières entrées
      .slice(0, 50);

      // Exclure les shorts
      items = items.filter(item => {

        const title =
          item.querySelector("title")?.textContent.toLowerCase() || "";

        const desc =
          item.querySelector("description")?.textContent.toLowerCase() || "";

        return !title.includes("#shorts")
          && !title.includes("shorts")
          && !desc.includes("#shorts");
      });

      const feed = document.getElementById("feed");

      items.forEach(item => {

        const title =
          item.querySelector("title")?.textContent || "";

        const link =
          item.querySelector("link")?.textContent || "#";

        const author =
          item.querySelector("author")?.textContent || "Auteur";

        const description =
          item.querySelector("description")?.textContent || "";

        const pubDate = new Date(
          item.querySelector("pubDate")?.textContent || ""
        );

        // Gestion unicode / accents / caractères spéciaux
        const safeAuthor = author.normalize("NFC");

        const formattedDate = pubDate.toLocaleDateString(
          "fr-FR",
          {
            day: "2-digit",
            month: "2-digit",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit"
          }
        );

        const div = document.createElement("div");

        div.className = "item";

        div.setAttribute("data-author", safeAuthor);

        div.innerHTML = `
          <div class="top">

            <span class="author" data-author="${safeAuthor}">
              ${author}
            </span>

            <span class="date">
              ${formattedDate}
            </span>

          </div>

          <div class="title">
            <a href="${link}" target="_blank">
              ${title}
            </a>
          </div>

          <div class="desc">
            ${description.replace(/\n/g, " ")}
          </div>
        `;

        feed.appendChild(div);
      });
    }

    loadRSS();
  </script>
