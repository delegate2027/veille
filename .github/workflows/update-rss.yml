name: update-rss

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: write

concurrency:
  group: update-rss
  cancel-in-progress: false  # IMPORTANT: on ne tue plus les runs, on les sérialise

jobs:
  update-rss:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      UPDATE_FREQUENCY: "15"

    steps:
      - name: Show trigger
        run: echo "Triggered by ${{ github.event_name }}"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run RSS script
        run: python rss.py

      - name: Commit and push with retry (industrial safe mode)
        run: |
          set -e

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Si rien à commit → exit direct
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto update feed"

          MAX_RETRIES=5
          COUNT=0

          until [ $COUNT -ge $MAX_RETRIES ]
          do
            echo "Attempt $((COUNT+1))/$MAX_RETRIES"

            # Toujours repartir de l'état remote le plus récent
            git fetch origin main
            git rebase origin/main

            # Push optimiste
            if git push origin HEAD:main; then
              echo "Push succeeded"
              exit 0
            fi

            echo "Push failed (concurrent update detected), retrying..."
            COUNT=$((COUNT+1))
            sleep $((2 + RANDOM % 5))
          done

          echo "Failed after $MAX_RETRIES attempts"
          exit 1
